<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#3D1C02">
<title>Nāda Bodha — Visual Carnatic Music for Beginners</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'%3E%3Crect width='44' height='44' rx='8' fill='%232C1006'/%3E%3Ccircle cx='22' cy='22' r='18' fill='none' stroke='%23D4A017' stroke-width='1.5'/%3E%3Cpath d='M10,22 Q14,14 18,22 Q22,30 26,22 Q30,14 34,22' fill='none' stroke='%23F5C842' stroke-width='2' stroke-linecap='round'/%3E%3Ccircle cx='22' cy='10' r='2.5' fill='%23F5C842'/%3E%3C/svg%3E">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="hdr-raga">
        <span class="label">Raga</span>
        <span class="value" id="hdrRaga">Mayamalavagowla</span>
    </div>
    <div class="hdr-title" id="hdrTitle"><svg width="28" height="28" viewBox="0 0 44 44" style="vertical-align:middle;margin-right:8px;flex-shrink:0"><circle cx="22" cy="22" r="20" fill="none" stroke="#D4A017" stroke-width="1.5"/><path d="M10,22 Q14,14 18,22 Q22,30 26,22 Q30,14 34,22" fill="none" stroke="#F5C842" stroke-width="2" stroke-linecap="round"/><circle cx="22" cy="10" r="2.5" fill="#F5C842"/><line x1="38" y1="16" x2="38" y2="28" stroke="#D4A017" stroke-width="1.5" stroke-linecap="round"/></svg>Nāda Bodha<span style="background:#D4A017;color:#2C1006;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;vertical-align:middle;margin-left:8px;font-family:Arial,sans-serif;letter-spacing:0.5px;">v1.0</span><br><span style="font-size:13px;color:#E8C97E;font-weight:normal;letter-spacing:.06em;">Visual Carnatic Music · Beginner Guide</span></div>
    <div class="hdr-jati">
        <span class="label" id="hdrTalaLabel">Jati &amp; Thalam</span>
        <span class="value" id="hdrTala">Chatusra · Adi</span>
        <span class="streak-badge" id="streakBadge"></span>
    </div>
</header>

<div class="main">

    <div class="lesson-picker">
        <div class="picker-row">
            <div class="picker-label">Grade</div>
            <div class="grade-tabs" id="gradeTabs"></div>
        </div>
        <div class="picker-row">
            <div class="picker-label" id="versePLabel">Verse</div>
            <div class="verse-tabs" id="verseTabs"></div>
        </div>
    </div>

    <div id="customBuilder" style="display:none"></div>

    <div id="bpmRow" class="bpm-row"><span id="bpmDisplay">♩ = 90 BPM · Madhyama Kala</span></div>

    <div class="verse-box">
        <div class="verse-label" id="verseLabel">Grade 1 · Verse 1</div>
        <div class="verse-notes" id="verseNotes"></div>
    </div>

    <div class="chart-section">
        <div id="chartScrollFrame">
            <div id="chartsContainer"></div>
        </div>
        <div id="beatPalmIndicator" style="display:none;flex-direction:column;align-items:center;justify-content:center;padding:10px 0 8px;gap:6px;width:100%;background:rgba(21,8,0,0.06);border-top:1px solid rgba(139,69,19,0.2);border-bottom:1px solid rgba(139,69,19,0.2);">
            <div id="beatPalmSvg" style="width:80px;height:80px;transition:transform 200ms ease,filter 200ms ease;"></div>
            <div style="display:flex;gap:0;align-items:center;">
                <span id="beatPalmName" style="font-size:12px;color:#8B4513;font-weight:700;text-transform:uppercase;letter-spacing:2px;"></span>
                <span id="beatPalmSolkattu" style="display:none;"></span>
            </div>
            <div id="beatProgressDots" style="display:flex;gap:5px;align-items:center;margin-top:2px;"></div>
        </div>
        <div id="fixedHandsRow" class="hands-row"></div>
        <div id="pulseBarOuter"></div>
        <div class="speed-row">
            <span class="speed-label">Kala:</span>
            <select id="bpmSelect">
                <optgroup label="Beginner">
                    <option value="40">40 BPM</option>
                    <option value="50">50 BPM</option>
                    <option value="60">60 BPM</option>
                </optgroup>
                <optgroup label="Student">
                    <option value="72">72 BPM</option>
                    <option value="80">80 BPM</option>
                    <option value="90" selected>90 BPM</option>
                    <option value="100">100 BPM</option>
                </optgroup>
                <optgroup label="Performance">
                    <option value="108">108 BPM</option>
                    <option value="120">120 BPM</option>
                    <option value="144">144 BPM</option>
                </optgroup>
            </select>
            <button class="speed-btn" data-mult="0.5">Chauka ½×</button>
            <button class="speed-btn active" data-mult="1">Madhyama 1×</button>
            <button class="speed-btn" data-mult="2">Dwitiya 2×</button>
            <button class="speed-btn" data-mult="4">Tritiya 4×</button>
        </div>
        <div class="controls">
            <button id="playBtn">&#9654;&#xFE0E;&nbsp;Play</button>
            <button id="muteBtn">&#128266;&nbsp;Sound</button>
            <button id="metroBtn">&#x1F941;&nbsp;Metro: OFF</button>
            <div class="shruti-group">
                <button id="shrutiBtn">&#127925;&nbsp;Shruti: OFF</button>
                <span class="shruti-sa-lbl">Sa&nbsp;=</span>
                <select id="shrutiSelect">
                    <option value="130.81">C &nbsp;(1 kattai)</option>
                    <option value="138.59" selected>C# (1.5 kattai)</option>
                    <option value="146.83">D &nbsp;(2 kattai)</option>
                    <option value="155.56">D# (2.5 kattai)</option>
                    <option value="164.81">E &nbsp;(3 kattai)</option>
                    <option value="174.61">F &nbsp;(4 kattai)</option>
                    <option value="184.99">F# (4.5 kattai)</option>
                    <option value="196.00">G &nbsp;(5 kattai)</option>
                    <option value="207.65">G# (5.5 kattai)</option>
                    <option value="220.00">A &nbsp;(6 kattai)</option>
                    <option value="233.08">A# &nbsp;(6.5 kattai)</option>
                    <option value="246.94">B  &nbsp;(7 kattai)</option>
                </select>
            </div>
            <button id="progressBtn">&#128202;&nbsp;Progress</button>
            <button id="printBtn">&#x1F5A8;&#xFE0E;&nbsp;Print</button>
            <button id="resetBtn">&#8635;&nbsp;Reset</button>
        </div>
        <div class="legend">
            <div class="legend-item">
                <span class="legend-dot" style="background:#E53E3E;border:1.5px solid #B91C1C;"></span>Note
            </div>
            <div class="legend-item">
                <span class="legend-dot" style="background:#22C55E;border:1.5px solid #16A34A;"></span>Active
            </div>
            <div class="legend-item">
                <span class="legend-line" style="background:#4A90D9;"></span>Contour
            </div>
        </div>
        <div id="markPracticedRow" style="display:none"></div>
    </div>
</div>

<div id="printArea"></div>

<div id="progressModal" class="pg-overlay" style="display:none">
    <div class="pg-modal">
        <button class="pg-close" id="pgClose">&times;</button>
        <div class="pg-title">&#128202; Progress Overview</div>
        <div class="pg-streak-line" id="pgStreakLine"></div>
        <div id="pgGradeList"></div>
        <div class="pg-stats" id="pgStats"></div>
    </div>
</div>

<div id="toast"></div>

<script src="lessonData.js"></script>
<script src="pitch.js"></script>
<script src="audio.js"></script>
<script src="tala.js"></script>
<script src="chart.js"></script>
<script src="app.js"></script>
</body>
</html>
